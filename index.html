<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinkjulieland POS</title>
    
    <!-- ฟอนต์ Mitr -->
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href='data:application/manifest+json,{"name":"PJ POS","short_name":"PJ POS","display":"standalone","background_color":"#fffafc","theme_color":"#ff8eb3","start_url":"."}'>

    <style>
        :root {
            --pink-light: #fffafc;
            --pink-gradient: linear-gradient(180deg, #ff8eb3 0%, #ffb6c1 100%);
            --pink-primary: #ff7096;
            --pink-shadow: rgba(255, 112, 150, 0.4);
            --text-dark: #5d3a49;
            --text-gray: #8a6575;
            --white: #ffffff;
            --bg-gray: #fcf8fa;
            --border-color: #f5eaef;
        }

        * { box-sizing: border-box; font-family: 'Mitr', sans-serif; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent;}
        
        body { background-color: #f0e6ea; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 428px; height: 100%; max-height: 100vh;
            background-color: var(--pink-light); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .page { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; position: relative;}
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ส่วนหัว --- */
        .header-bg {
            background: var(--pink-gradient); padding: 30px 20px 60px 20px;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            color: var(--white); text-align: center; position: relative; flex-shrink: 0;
        }
        .header-title { font-size: 22px; font-weight: 600; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .header-subtitle { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .back-btn { position: absolute; left: 20px; top: 35px; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .back-btn svg { width: 24px; height: 24px; fill: var(--white); }

        /* --- พื้นที่เนื้อหา --- */
        .content-area {
            flex: 1; overflow-y: auto; padding: 0 20px 100px 20px;
            margin-top: -30px; z-index: 10;
        }
        .white-card {
            background: var(--white); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03); margin-bottom: 20px;
        }

        /* --- ปุ่ม --- */
        .btn {
            background: var(--pink-gradient); color: var(--white); border: none;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 500;
            width: 100%; cursor: pointer; transition: 0.2s; text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #e0d5d9; color: #a89a9f; cursor: not-allowed; box-shadow: none; }
        .btn-outline {
            background: var(--white); color: var(--pink-primary);
            border: 2px solid var(--pink-primary); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 500;
            width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* --- Login --- */
        .login-page { background: var(--pink-light); justify-content: center; padding: 20px;}
        .login-logo { width: 100px; height: 100px; background: var(--pink-gradient); border-radius: 50%; margin: 0 auto 30px auto; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px var(--pink-shadow);}
        .login-logo svg { width: 50px; height: 50px; fill: var(--white); }
        .input-group { margin-bottom: 20px; text-align: left;}
        .input-group label { display: block; color: var(--text-dark); margin-bottom: 8px; font-size: 14px; font-weight: 500;}
        .input-field {
            width: 100%; padding: 15px; background: var(--bg-gray); border: 1px solid #f0e6ea;
            border-radius: 12px; font-size: 15px; color: var(--text-dark); transition: 0.3s;
        }
        .input-field:focus { border-color: var(--pink-primary); background: var(--white); }

        /* --- POS Grid --- */
        .grid-products { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .product-item {
            background: var(--white); border-radius: 16px; padding: 15px 10px;
            text-align: center; border: 2px solid var(--border-color); cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); position: relative; transition: 0.2s;
        }
        .product-item:active { transform: scale(0.96); }
        .product-item.disabled { opacity: 0.5; pointer-events: none; border-color: transparent; }
        
        /* สไตล์เมื่อเลือกสินค้าแล้ว (มีของในตะกร้า) */
        .product-item.selected {
            border-color: var(--pink-primary);
            background-color: #fff5f8;
        }
        .check-icon {
            position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; background: var(--pink-primary);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 5px var(--pink-shadow);
        }
        .check-icon svg { width: 14px; height: 14px; fill: var(--white); }
        
        .p-icon { width: 40px; height: 40px; background: var(--pink-light); border-radius: 10px; display: flex; justify-content: center; align-items: center; margin: 0 auto 10px auto;}
        .p-icon svg { width: 20px; height: 20px; fill: var(--pink-primary); }
        .p-name { color: var(--text-dark); font-size: 14px; font-weight: 500; margin-bottom: 5px; line-height: 1.2; }
        .p-price { color: var(--pink-primary); font-size: 15px; font-weight: 600; }
        
        /* ป้ายแจ้งสต๊อก (ย้ายมาซ้ายมือเพื่อไม่ให้ทับกับติ๊กถูก) */
        .p-badge { position: absolute; top: 10px; left: 10px; background: #fff0f5; color: var(--pink-primary); font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 500;}

        /* --- Cart --- */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed var(--border-color); }
        .cart-info { flex: 1; }
        .cart-title { color: var(--text-dark); font-size: 15px; font-weight: 500; }
        .cart-price { color: var(--text-gray); font-size: 13px; margin-top: 3px; }
        .qty-controls { display: flex; align-items: center; background: var(--pink-light); border-radius: 20px; padding: 2px 5px; }
        .qty-btn { background: none; border: none; color: var(--pink-primary); padding: 5px 10px; font-size: 18px; cursor: pointer; }
        .qty-num { font-size: 14px; font-weight: 600; color: var(--text-dark); min-width: 20px; text-align: center; }
        
        .total-section { display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 600; color: var(--text-dark); margin: 20px 0; }
        .total-amount { color: var(--pink-primary); font-size: 22px; }

        /* --- Lists (Stock & Bills) --- */
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer;}
        .list-row:active { transform: scale(0.98); }
        .list-title { font-size: 15px; color: var(--text-dark); font-weight: 500;}
        .list-sub { font-size: 12px; color: var(--text-gray); margin-top: 2px;}
        .list-status { font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 8px;}

        /* --- Receipt / Bill Detail --- */
        .receipt-box { background: var(--bg-gray); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #e0d5d9; }
        .receipt-header { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .receipt-no { font-size: 20px; font-weight: 600; color: var(--pink-primary); }
        .receipt-date { font-size: 12px; color: var(--text-gray); margin-top: 5px; }
        .receipt-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: var(--text-dark); }
        .receipt-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 600; color: var(--text-dark); margin-top: 15px; padding-top: 15px; border-top: 2px solid var(--border-color); }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03); border-top-left-radius: 25px; border-top-right-radius: 25px;
            z-index: 100; padding: 0 10px;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-gray); text-decoration: none; font-size: 10px; font-weight: 500;
            width: 60px; cursor: pointer; transition: 0.2s;
        }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 5px; fill: var(--text-gray); transition: 0.2s;}
        .nav-item.active { color: var(--pink-primary); }
        .nav-item.active svg { fill: var(--pink-primary); }

        /* Center Floating Button */
        .nav-center-wrapper { position: absolute; left: 50%; transform: translateX(-50%); top: -20px; }
        .nav-center {
            width: 65px; height: 65px; background: var(--pink-gradient); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px var(--pink-shadow); color: var(--white); font-size: 10px; font-weight: 500; cursor: pointer;
            border: 4px solid var(--pink-light);
        }
        .nav-center svg { width: 26px; height: 26px; fill: var(--white); margin-bottom: 2px;}
        .cart-badge {
            position: absolute; top: -2px; right: -2px; background: #ff3b3b; color: white;
            font-size: 10px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; border: 2px solid var(--white);
            display: none;
        }

        /* --- Loader & Toast --- */
        #loader { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 999; }
        .spinner { border: 4px solid #f5eaef; border-top: 4px solid var(--pink-primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        .toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(93, 58, 73, 0.9); color: white; padding: 12px 20px; border-radius: 20px;
            font-size: 14px; font-weight: 500; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .toast svg { width: 16px; height: 16px; fill: white; }
        .toast.show { opacity: 1; top: 40px; }

        /* SVG Icons Inline */
        .icon-sm { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="loader"><div class="spinner"></div></div>
        <div id="toast" class="toast">
            <svg viewBox="0 0 24 24" id="toast-icon"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            <span id="toast-text">แจ้งเตือน</span>
        </div>

        <!-- หน้า 1: Login -->
        <div id="page-login" class="page active login-page">
            <div class="white-card" style="padding: 40px 20px; margin-top: 20px;">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <h2 style="color:var(--text-dark); text-align:center; margin-bottom:5px;">Welcome Back</h2>
                <p style="color:var(--text-gray); text-align:center; font-size: 14px; margin-bottom: 30px;">เข้าสู่ระบบจัดการร้าน Pinkjulieland</p>
                
                <div class="input-group">
                    <label>อีเมลผู้ดูแลร้าน</label>
                    <input type="email" id="login-email" class="input-field" placeholder="Admin Email">
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="login-pass" class="input-field" placeholder="Password">
                </div>
                <button class="btn" style="margin-top: 10px;" onclick="doLogin()">เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- หน้า 2: หน้าแรก (ขายสินค้า) -->
        <div id="page-pos" class="page">
            <div class="header-bg">
                <div class="header-title">PINKJULIELAND</div>
                <div class="header-subtitle">Mobile POS System</div>
            </div>
            <div class="content-area">
                <div class="white-card">
                    <h3 style="color:var(--text-dark); font-size:16px; margin-bottom:15px; display:flex; align-items:center; gap:8px;">
                        <svg viewBox="0 0 24 24" class="icon-sm" style="fill:var(--pink-primary);"><path d="M21 11.11V7a2 2 0 0 0-2-2h-4.18C14.4 3.84 13.3 3 12 3s-2.4.84-2.82 2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6.11A6.86 6.86 0 0 1 11 18c0-3.86 3.14-7 7-7 1.05 0 2.05.24 3 .67zM12 5c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 13h-6v6h-2v-6H9v-2h6v-6h2v6h6v2z"/></svg>
                        รายการสินค้าทั้งหมด
                    </h3>
                    <div class="grid-products" id="product-grid"></div>
                </div>
            </div>
        </div>

        <!-- หน้า 3: ตะกร้าสินค้า (ตรงกลาง) -->
        <div id="page-cart" class="page">
            <div class="header-bg" style="padding-bottom: 50px;">
                <div class="header-title">ตระกร้าสินค้า</div>
            </div>
            <div class="content-area">
                <div class="white-card">
                    <h3 style="color:var(--text-dark); font-size:16px; margin-bottom:15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">รายการที่เลือก</h3>
                    <div id="cart-list"></div>
                    <div class="total-section">
                        <span>ยอดรวมทั้งสิ้น</span>
                        <span class="total-amount" id="cart-total">0.-</span>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label>ข้อมูลลูกค้า / บันทึกย่อ</label>
                        <input type="text" id="customer-name" class="input-field" placeholder="ชื่อลูกค้า หรือ Note...">
                    </div>
                    <button class="btn" id="btn-pay" onclick="doCheckout()" disabled>สร้างบิล / ชำระเงิน</button>
                </div>
            </div>
        </div>

        <!-- หน้า 4: ประวัติบิล -->
        <div id="page-bills" class="page">
            <div class="header-bg" style="padding-bottom: 50px;">
                <div class="header-title">ประวัติบิลย้อนหลัง</div>
            </div>
            <div class="content-area">
                <div class="white-card">
                    <h3 style="color:var(--text-dark); font-size:16px; margin-bottom:15px;">รายการบิลทั้งหมด</h3>
                    <div class="list-container" id="bills-list"></div>
                </div>
            </div>
        </div>

        <!-- หน้า 5: สต๊อกสินค้า -->
        <div id="page-stock" class="page">
            <div class="header-bg" style="padding-bottom: 50px;">
                <div class="header-title">ระบบหลังบ้าน</div>
            </div>
            <div class="content-area">
                <div class="white-card">
                    <h3 style="color:var(--text-dark); font-size:16px; margin-bottom:15px;">สต๊อกสินค้าปัจจุบัน</h3>
                    <div class="list-container" id="stock-table"></div>
                </div>
            </div>
        </div>

        <!-- หน้าพิเศษ: ดูรายละเอียดบิล (ซ่อนแถบเมนูล่าง) -->
        <div id="page-bill-detail" class="page">
            <div class="header-bg" style="padding-bottom: 50px;">
                <div class="back-btn" onclick="switchTab('bills')">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </div>
                <div class="header-title">สรุปยอดสั่งซื้อ</div>
            </div>
            <div class="content-area">
                <div class="white-card">
                    <div class="receipt-box" id="receipt-content">
                        <!-- รายละเอียดบิลแทรกตรงนี้ -->
                    </div>
                    
                    <button class="btn" onclick="copyBillText()" style="margin-bottom: 10px;">
                        <svg viewBox="0 0 24 24" class="icon-sm"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        คัดลอกข้อความสรุปยอด
                    </button>
                    <button class="btn-outline" onclick="switchTab('pos')">
                        กลับหน้าแรก
                    </button>
                </div>
            </div>
        </div>

        <!-- แถบเมนูด้านล่าง (5 ปุ่ม) -->
        <div class="bottom-nav" id="bottom-nav" style="display: none;">
            <div class="nav-item active" id="tab-pos" onclick="switchTab('pos')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>หน้าแรก
            </div>
            <div class="nav-item" id="tab-bills" onclick="switchTab('bills')">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>ประวัติบิล
            </div>
            
            <div style="width: 60px;"></div> <!-- เว้นที่ให้ปุ่มตรงกลาง -->

            <div class="nav-item" id="tab-stock" onclick="switchTab('stock')">
                <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15zM5 15.91l6 3.38v-6.71L5 9.21v6.7zM19 9.21l-6 3.38v6.71l6-3.38v-6.7z"/></svg>สต๊อก
            </div>
            <div class="nav-item" onclick="doLogout()">
                <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>ออกระบบ
            </div>

            <!-- ปุ่มตรงกลางแบบ Absolute -->
            <div class="nav-center-wrapper">
                <div class="nav-center" onclick="switchTab('cart')">
                    <div class="cart-badge" id="cart-badge">0</div>
                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    ตะกร้า
                </div>
            </div>
        </div>

    </div>

    <!-- Supabase JS -->
    <script type="module">

        // API Keys
        const SUPABASE_URL = 'https://qrttkykdkzgpvvqswtza.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydHRreWtka3pncHZ2cXN3dHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTI2NzgsImV4cCI6MjA5MDY2ODY3OH0.FDLDA4BdYcxfSsotTXKZwDF1EjJ6AO0qmFyrGkV3Mj4';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        let billsHistory = [];
        let currentBillForCopy = null;

        const showLoader = (show) => document.getElementById('loader').style.display = show ? 'flex' : 'none';
        
        const showToast = (msg, isSuccess = true) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            document.getElementById('toast-icon').innerHTML = isSuccess 
                ? '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>'
                : '<path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        };

        const formatThaiTime = (dateString, formatType) => {
            let dStr = dateString;
            if (!dStr.endsWith('Z') && !dStr.includes('+')) dStr += 'Z'; 
            
            const d = new Date(dStr);
            if (formatType === 'short') {
                return d.toLocaleDateString('th-TH', { year: '2-digit', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } else {
                return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }
        };

        // ==========================================
        // 1. ระบบ Navigation
        // ==========================================
        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${tab}`).classList.add('active');
            
            if (tab === 'login' || tab === 'bill-detail') {
                document.getElementById('bottom-nav').style.display = 'none';
            } else {
                document.getElementById('bottom-nav').style.display = 'flex';
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                if(document.getElementById(`tab-${tab}`)) {
                    document.getElementById(`tab-${tab}`).classList.add('active');
                }
                
                if (tab === 'pos') {
                    if (products.length === 0) loadProducts();
                    else renderProductsGrid(); // อัปเดต UI กรอบสีชมพูเสมอ
                }
                if (tab === 'stock') loadStock();
                if (tab === 'cart') renderCart();
                if (tab === 'bills') loadBills();
            }
        };

        // ==========================================
        // 2. Auth
        // ==========================================
        async function checkSession() {
            showLoader(true);
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;
                
                if (session) {
                    currentUser = session.user;
                    switchTab('pos');
                } else {
                    switchTab('login');
                }
            } catch (err) {
                switchTab('login');
            }
            showLoader(false);
        }

        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            if(!email || !password) return showToast('กรุณากรอกข้อมูลให้ครบ', false);
            
            showLoader(true);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง', false);
            } else {
                currentUser = data.user;
                document.getElementById('login-email').value = '';
                document.getElementById('login-pass').value = '';
                switchTab('pos');
                showToast('เข้าสู่ระบบสำเร็จ');
            }
            showLoader(false);
        };

        window.doLogout = async () => {
            showLoader(true);
            await supabase.auth.signOut();
            currentUser = null; cart = []; updateCartBadge();
            renderProductsGrid(); // ล้างกรอบสีชมพูเมื่อออกระบบ
            switchTab('login');
            showLoader(false);
        };

        // ==========================================
        // 3. POS & Cart
        // ==========================================
        async function loadProducts() {
            showLoader(true);
            const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: true });
            if (!error) {
                products = data;
                renderProductsGrid();
            }
            showLoader(false);
        }

        // แยกฟังก์ชันการวาดสินค้าออกมา เพื่อให้อัปเดต UI (กรอบสีชมพู) ได้ง่ายๆ
        window.renderProductsGrid = () => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const isOut = p.is_limited && p.stock <= 0;
                const isInCart = cart.find(i => i.id === p.id); // เช็คว่ามีในตะกร้าไหม
                
                const div = document.createElement('div');
                div.className = `product-item ${isOut ? 'disabled' : ''} ${isInCart ? 'selected' : ''}`;
                div.onclick = () => { if(!isOut) addToCart(p); };
                
                // ไอคอนสินค้า
                let svgIcon = '<path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>';
                if(p.name.includes('แอป') || p.name.includes('GN')) svgIcon = '<path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/>';
                if(p.name.includes('เว็บ')) svgIcon = '<path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>';
                
                // ติ๊กถูกสีชมพู
                const checkIconHtml = isInCart ? `<div class="check-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>` : '';
                
                div.innerHTML = `
                    ${p.is_limited ? `<div class="p-badge">${isOut ? 'หมด' : 'เหลือ '+p.stock}</div>` : ''}
                    ${checkIconHtml}
                    <div class="p-icon"><svg viewBox="0 0 24 24">${svgIcon}</svg></div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price}.-</div>
                `;
                grid.appendChild(div);
            });
        };

        window.addToCart = (product) => {
            const item = cart.find(i => i.id === product.id);
            if (product.is_limited) {
                const currentQty = item ? item.qty : 0;
                if (currentQty + 1 > product.stock) return showToast(`สิทธิ์เต็มแล้วค่ะ (เหลือ ${product.stock})`, false);
            }
            if (item) item.qty++;
            else cart.push({ ...product, qty: 1 });
            
            showToast(item ? `เพิ่มจำนวน ${product.name}` : `เลือก ${product.name} แล้ว`);
            updateCartBadge();
            renderProductsGrid(); // อัปเดตติ๊กถูกทันที
        };

        window.updateQty = (id, change) => {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            if (change > 0 && item.is_limited && (item.qty + change > item.stock)) return showToast(`เกินจำนวนสต๊อกค่ะ`, false);

            item.qty += change;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            
            renderCart(); 
            updateCartBadge();
            renderProductsGrid(); // เผื่อกรณีลบสินค้าออกจากตะกร้าจนหมด ติ๊กถูกจะได้หายไป
        };

        function updateCartBadge() {
            let totalItems = 0;
            cart.forEach(i => totalItems += i.qty);
            const badge = document.getElementById('cart-badge');
            badge.style.display = totalItems > 0 ? 'flex' : 'none';
            badge.innerText = totalItems;
        }

        window.renderCart = () => {
            const list = document.getElementById('cart-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-gray); font-size: 14px;">ยังไม่มีสินค้าในตระกร้า</div>`;
                document.getElementById('cart-total').innerText = '0.-';
                document.getElementById('btn-pay').disabled = true;
                return;
            }
            list.innerHTML = '';
            cart.forEach(item => {
                total += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-info">
                        <div class="cart-title">${item.name}</div>
                        <div class="cart-price">${item.price}.- / รายการ</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <div class="qty-num">${item.qty}</div>
                        <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total').innerText = total + '.-';
            document.getElementById('btn-pay').disabled = false;
        }

        // ==========================================
        // 4. ระบบบิล (Checkout, ดูประวัติ, สรุปยอด)
        // ==========================================
        window.doCheckout = async () => {
            if(cart.length === 0) return;
            showLoader(true);

            try {
                const customer = document.getElementById('customer-name').value || 'ลูกค้าทั่วไป';
                let total = 0; cart.forEach(i => total += (i.price * i.qty));

                const { count } = await supabase.from('bills').select('*', { count: 'exact', head: true });
                const billNumber = 'PJ' + String((count || 0) + 1).padStart(4, '0');

                const { data: billData, error: billErr } = await supabase.from('bills')
                    .insert([{ bill_number: billNumber, customer_name: customer, total: total, created_by: currentUser.id }])
                    .select().single();
                if(billErr) throw billErr;

                const itemsToInsert = cart.map(item => ({ bill_id: billData.id, product_name: item.name, price: item.price, qty: item.qty }));
                await supabase.from('bill_items').insert(itemsToInsert);

                for (let item of cart) {
                    if (item.is_limited) await supabase.from('products').update({ stock: item.stock - item.qty }).eq('id', item.id);
                }

                cart = []; updateCartBadge(); document.getElementById('customer-name').value = '';
                
                showToast('สร้างบิลสำเร็จ');
                // อัปเดตกรอบสีชมพูในหน้าสินค้าออก
                await loadProducts(); 
                await viewBillDetail(billData.id);

            } catch (error) {
                showToast('เกิดข้อผิดพลาดในการสร้างบิล', false);
                console.error(error);
            }
            showLoader(false);
        };

        async function loadBills() {
            showLoader(true);
            const { data, error } = await supabase.from('bills').select('*').order('created_at', { ascending: false });
            if(!error) {
                billsHistory = data;
                const list = document.getElementById('bills-list');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-gray);">ยังไม่มีประวัติการขาย</div>`;
                } else {
                    data.forEach(b => {
                        const date = formatThaiTime(b.created_at, 'short');
                        list.innerHTML += `
                            <div class="list-row" onclick="viewBillDetail('${b.id}')">
                                <div>
                                    <div class="list-title">${b.bill_number}</div>
                                    <div class="list-sub">${b.customer_name} | ${date}</div>
                                </div>
                                <div class="list-status" style="color: var(--pink-primary); background: #fff0f5;">${b.total}.-</div>
                            </div>
                        `;
                    });
                }
            }
            showLoader(false);
        }

        window.viewBillDetail = async (billId) => {
            showLoader(true);
            const { data: bill } = await supabase.from('bills').select('*').eq('id', billId).single();
            const { data: items } = await supabase.from('bill_items').select('*').eq('bill_id', billId);
            
            if(bill && items) {
                const date = formatThaiTime(bill.created_at, 'long');
                const box = document.getElementById('receipt-content');
                
                let itemsHtml = '';
                let copyTextItems = '';
                items.forEach(i => {
                    itemsHtml += `<div class="receipt-item"><span>${i.product_name} x${i.qty}</span><span>${i.price * i.qty}.-</span></div>`;
                    copyTextItems += `- ${i.product_name} x${i.qty} : ${i.price * i.qty}.-\n`;
                });

                box.innerHTML = `
                    <div class="receipt-header">
                        <div class="receipt-no">สรุปยอดสั่งซื้อ (${bill.bill_number})</div>
                        <div class="receipt-date">${date}</div>
                    </div>
                    <div style="margin-bottom: 15px; font-size: 14px; font-weight: 500; color: var(--text-dark);">คุณลูกค้า: ${bill.customer_name}</div>
                    <div style="margin-bottom: 10px; font-size: 14px; color: var(--text-gray);">รายการสินค้า:</div>
                    ${itemsHtml}
                    <div class="receipt-total"><span>รวมทั้งสิ้น</span><span>${bill.total}.-</span></div>
                `;

                currentBillForCopy = `[ สรุปยอดสั่งซื้อ ${bill.bill_number} ]\nคุณลูกค้า: ${bill.customer_name}\n\nรายการ:\n${copyTextItems}\nรวมทั้งสิ้น: ${bill.total}.-\n\nขอบคุณที่อุดหนุน Pinkjulieland ค่ะ`;

                switchTab('bill-detail');
            }
            showLoader(false);
        }

        window.copyBillText = () => {
            if(!currentBillForCopy) return;
            const textArea = document.createElement("textarea");
            textArea.value = currentBillForCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('คัดลอกข้อความแล้ว นำไปวางส่งลูกค้าได้เลย');
            } catch (err) {
                showToast('ไม่สามารถคัดลอกได้', false);
            }
            document.body.removeChild(textArea);
        };

        // ==========================================
        // 5. สต๊อกสินค้า
        // ==========================================
        async function loadStock() {
            showLoader(true);
            const { data } = await supabase.from('products').select('*').order('created_at', { ascending: true });
            const tbody = document.getElementById('stock-table');
            tbody.innerHTML = '';
            
            data.forEach(p => {
                let statusColor = p.is_limited && p.stock <= 0 ? '#ff3b3b' : 'var(--pink-primary)';
                let statusText = p.is_limited ? `เหลือ ${p.stock}` : 'ไม่จำกัดสต๊อก';
                if(p.is_limited && p.stock <= 0) statusText = 'สินค้าหมด';

                tbody.innerHTML += `
                    <div class="list-row" style="cursor: default;">
                        <div>
                            <div class="list-title">${p.name}</div>
                            <div class="list-sub">ราคา ${p.price}.-</div>
                        </div>
                        <div class="list-status" style="color: ${statusColor}; background: ${p.is_limited && p.stock <= 0 ? '#ffebeb' : '#fff0f5'};">
                            ${statusText}
                        </div>
                    </div>
                `;
            });
            showLoader(false);
        }

        // PWA บัตรผ่าน
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', ()=>{});`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        window.onload = checkSession;
    </script>
</body>
</html>
